<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Reserver Biografbillet</h1>

    <section>
        <h2>Vælg sæder</h2>
        <p id="showing-title">Henter visning...</p>
        <p>LÆRRED</p>
        <div id="seat-map"></div>
        <p>
            Valgte sæder: <span id="selected-count">0</span> —
            Pris: <span id="total-price">0</span> kr.
        </p>
    </section>

    <section>
        <h2>Dine oplysninger</h2>

        <label>Navn</label>
        <input id="customerName" placeholder="Indtast navn">

        <label>Email</label>
        <input id="customerEmail" placeholder="Indtast email">

        <label>Telefon</label>
        <input id="customerPhone" placeholder="Indtast telefonnummer">

        <button id="submit-btn" onclick="submitReservation()" disabled>Reserver billet</button>

        <p id="message"></p>
    </section>

    <section id="confirmation" style="display:none;">
        <h2>✅ Reservation bekræftet!</h2>
        <p id="confirm-name"></p>
        <p id="confirm-seats"></p>
        <p id="confirm-total"></p>
        <a href="/">← Tilbage til forsiden</a>
    </section>

    <script src="/reservations.js"></script>

</body>
</html>
