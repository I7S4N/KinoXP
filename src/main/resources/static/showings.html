<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Showings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Admin - Showings</h1>

    <section>
        <h2>Opret Film</h2>

        <input id="movieTitle" placeholder="Film titel">

        <button onclick="createMovie()">Opret Film</button>

    </section>

    <section>
        <h2>Opret Showing</h2>

        <label>Film</label>
        <select id="movieDropdown"></select>

        <label>Biograf / Sal</label>
        <select id="theaterDropdown"></select>

        <label>Tid</label>
        <input id="showingTime" type="time">

        <button onclick="createShowing()">Opret Showing</button>

    </section>

    <section>
        <h2>Showings Liste</h2>

        <ul id="showingsList"></ul>

    </section>

    <script>

        let movies = [
            { id: 1, title: "Dune" },
            { id: 2, title: "Batman" }
        ]

        let theaters = [
            { id: 1, name: "Sal 1" },
            { id: 2, name: "Sal 2" },
        ]

        let showings = [
            { movieId: 1, theaterId: 2, time: "18:00" },
            { movieId: 2, theaterId: 1, time: "20:30" }
        ]

        function loadShowings() {

            let list = document.getElementById("showingsList")
            list.innerHTML = ""

            showings.forEach(show => {

                let movie = movies.find(m => m.id == show.movieId)
                let theater = theaters.find(t => t.id == show.theaterId)

                let li = document.createElement("li")

                li.textContent = movie.title + " - " + theater.name + " - " + show.time

                list.appendChild(li)

            })

        }

        function createMovie() {

            let title = document.getElementById("movieTitle").value

            if (title === "") return

            let newMovie = {
                id: movies.length + 1,
                title: title
            }

            movies.push(newMovie)

            document.getElementById("movieTitle").value = ""

            loadMoviesDropdown()

        }

        function createShowing() {

            let movieId = document.getElementById("movieDropdown").value
            let theaterId = document.getElementById("theaterDropdown").value
            let time = document.getElementById("showingTime").value

            let newShowing = {
                movieId: movieId,
                theaterId: theaterId,
                time: time
            }

            showings.push(newShowing)

            loadShowings()

        }

        function loadMoviesDropdown() {

            let dropdown = document.getElementById("movieDropdown")
            dropdown.innerHTML = ""

            movies.forEach(movie => {

                let option = document.createElement("option")

                option.value = movie.id
                option.textContent = movie.title

                dropdown.appendChild(option)

            })

        }

        function loadTheatersDropdown() {

            let dropdown = document.getElementById("theaterDropdown")
            dropdown.innerHTML = ""

            theaters.forEach(theater => {

                let option = document.createElement("option")

                option.value = theater.id
                option.textContent = theater.name

                dropdown.appendChild(option)

            })

        }

        loadMoviesDropdown()
        loadTheatersDropdown()
        loadShowings()

    </script>

</body>

</html>
