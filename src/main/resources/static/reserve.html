<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserver billetter - KinoXPx</title>
</head>

<body>

    <header>
        <h1>🎬 KinoXPx</h1>
        <a href="index.html">← Tilbage til visninger</a>
    </header>

    <main>
        <h2 id="showing-title">Henter visning...</h2>

        <p>LÆRRED</p>

        <div id="seat-map"></div>

        <p>
            Ledig = grå |
            Valgt = markeret |
            Optaget = deaktiveret
        </p>

        <section>
            <h3>Dine oplysninger</h3>
            <div>
                <label>Navn</label>
                <input type="text" id="customerName" placeholder="Dit fulde navn" />
            </div>
            <div>
                <label>Email / Telefon</label>
                <input type="text" id="contactInfo" placeholder="email@eksempel.dk eller tlf." />
            </div>
        </section>

        <p>
            Valgte sæder: <span id="selected-count">0</span> —
            Pris: <span id="total-price">0</span> kr.
        </p>

        <button id="submit-btn" onclick="submitReservation()" disabled>
            Bekræft reservation
        </button>

        <p id="error-msg"></p>

        <div id="confirmation" style="display:none;">
            <h2>✅ Reservation bekræftet!</h2>
            <p id="confirm-name"></p>
            <p id="confirm-seats"></p>
            <p id="confirm-total"></p>
            <a href="index.html">← Tilbage til forsiden</a>
        </div>
    </main>

    <script src = "reserve.js"></script>

</body>

</html>
