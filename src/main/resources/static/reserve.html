<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserver billetter - KinoXPx</title>
</head>

<body>

    <header>
        <h1>🎬 KinoXPx</h1>
        <a href="index.html">← Tilbage til visninger</a>
    </header>

    <main>
        <h2 id="showing-title">Henter visning...</h2>

        <p>LÆRRED</p>

        <div id="seat-map"></div>

        <p>
            Ledig = grå |
            Valgt = markeret |
            Optaget = deaktiveret
        </p>

        <section>
            <h3>Dine oplysninger</h3>
            <div>
                <label>Navn</label>
                <input type="text" id="customerName" placeholder="Dit fulde navn" />
            </div>
            <div>
                <label>Email / Telefon</label>
                <input type="text" id="contactInfo" placeholder="email@eksempel.dk eller tlf." />
            </div>
        </section>

        <p>
            Valgte sæder: <span id="selected-count">0</span> —
            Pris: <span id="total-price">0</span> kr.
        </p>

        <button id="submit-btn" onclick="submitReservation()" disabled>
            Bekræft reservation
        </button>

        <p id="error-msg"></p>

        <div id="confirmation" style="display:none;">
            <h2>✅ Reservation bekræftet!</h2>
            <p id="confirm-name"></p>
            <p id="confirm-seats"></p>
            <p id="confirm-total"></p>
            <a href="index.html">← Tilbage til forsiden</a>
        </div>
    </main>

    <script>
        const API_BASE = "http://localhost:8090";
        const PRICE_PER_SEAT = 95;

        const params = new URLSearchParams(window.location.search);
        const showingId = params.get("showingId");

        let selectedSeats = [];
        let totalRows = 0;
        let seatsPerRow = 0;

        async function loadSeatMap(showingId) {
            try {
                const res = await fetch(`${API_BASE}/api/showings/${showingId}/seats`);
                if (!res.ok) throw new Error("Kunne ikke hente sæder");

                const data = await res.json();

                document.getElementById("showing-title")
                    .textContent = `${data.movieTitle} — ${formatDateTime(data.startTime)}`;

                totalRows = data.numberOfRows;
                seatsPerRow = data.seatsPerRow;

                renderSeatMap(data.reservedSeats);

            } catch (err) {
                document.getElementById("seat-map").innerHTML = `<p>${err.message}</p>`;
            }
        }

        function renderSeatMap(reservedSeats) {
            const map = document.getElementById("seat-map");
            map.innerHTML = "";

            const reservedSet = new Set(
                reservedSeats.map(s => `${s.seatRowNumber}-${s.seatNumber}`)
            );

            for (let row = 1; row <= totalRows; row++) {
                const rowEl = document.createElement("div");

                const label = document.createElement("span");
                label.textContent = `Række ${row}: `;
                rowEl.appendChild(label);

                for (let seat = 1; seat <= seatsPerRow; seat++) {
                    const btn = document.createElement("button");
                    btn.textContent = seat;

                    if (reservedSet.has(`${row}-${seat}`)) {
                        btn.disabled = true;
                    } else {
                        btn.onclick = () => toggleSeat(row, seat, btn);
                    }

                    rowEl.appendChild(btn);
                }
                map.appendChild(rowEl);
            }
        }

        function toggleSeat(row, seat, btn) {
            const key = `${row}-${seat}`;
            const idx = selectedSeats.findIndex(s => s.key === key);

            if (idx === -1) {
                selectedSeats.push({ key, seatRowNumber: row, seatNumber: seat });
                btn.style.fontWeight = "bold";
            } else {
                selectedSeats.splice(idx, 1);
                btn.style.fontWeight = "normal";
            }

            updateSummary();
        }

        function updateSummary() {
            const count = selectedSeats.length;
            document.getElementById("selected-count").textContent = count;
            document.getElementById("total-price").textContent = count * PRICE_PER_SEAT;
            document.getElementById("submit-btn").disabled = count === 0;
        }

        async function submitReservation() {
            const customerName = document.getElementById("customerName").value.trim();
            const contactInfo = document.getElementById("contactInfo").value.trim();
            const errorMsg = document.getElementById("error-msg");

            errorMsg.textContent = "";

            if (!customerName) { errorMsg.textContent = "Indtast venligst dit navn."; return; }
            if (!contactInfo) { errorMsg.textContent = "Indtast venligst email eller telefon."; return; }
            if (selectedSeats.length === 0) { errorMsg.textContent = "Vælg mindst ét sæde."; return; }

            const body = {
                showingId: parseInt(showingId),
                customerInfo: customerName,
                contactInfo: contactInfo,
                seats: selectedSeats.map(s => ({
                    seatRowNumber: s.seatRowNumber,
                    seatNumber: s.seatNumber
                }))
            };

            try {
                const res = await fetch(`${API_BASE}/api/reservations`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    errorMsg.textContent = await res.text();
                    return;
                }

                const data = await res.json();
                showConfirmation(data, customerName);

            } catch (err) {
                errorMsg.textContent = "Noget gik galt. Prøv igen.";
            }
        }

        function showConfirmation(data, customerName) {
            document.getElementById("submit-btn").style.display = "none";
            const conf = document.getElementById("confirmation");
            conf.style.display = "block";
            document.getElementById("confirm-name").textContent = `Navn: ${customerName}`;
            document.getElementById("confirm-seats").textContent =
                `Sæder: ${selectedSeats.map(s => `Række ${s.seatRowNumber}, Sæde ${s.seatNumber}`).join(" | ")}`;
            document.getElementById("confirm-total").textContent = `Total: ${data.totalPrice} kr.`;
        }

        function formatDateTime(dateStr) {
            return new Date(dateStr).toLocaleString("da-DK", {
                weekday: "long", month: "long", day: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
        }

        if (showingId) {
            loadSeatMap(showingId);
        } else {
            document.getElementById("showing-title").textContent = "Ingen visning valgt";
        }
    </script>

</body>

</html>
